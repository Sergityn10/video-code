<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown hover</title>
    <style>
      body {
        background: hsl(0, 0%, 20%);
        display: grid;
        place-content: center;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }

      .dropdown {
        a.dropdown-anchor {
          text-decoration: none;
          color: orange;
          anchor-name: --anchor;
          height: fit-content;
        }

        .dropdown-content {
          margin: 0;
          display: none;
          position: absolute;
          position-anchor: --anchor;
          top: calc(anchor(bottom) + 10px);
          left: anchor(center);
          transform: translateX(-50%);
          padding: 0;
          background: gray;
          padding: 4px 8px;
          list-style: none;
          a {
            text-decoration: none;
            color: white;
          }
        }

        &:hover .dropdown-content {
          display: flex;
          flex-direction: column;
          gap: 8px;
          animation: slideDown 0.3s ease;
        }
      }
      @keyframes slideDown {
        from {
          translate: 0 -20px;
        }
        to {
          translate: 0 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="dropdown">
        <a href="#" class="dropdown-anchor"
          >Servicios <span class="arrow">&or;</span></a
        >
        <ul class="dropdown-content">
          <li><a href="#">Diseño Web</a></li>
          <li><a href="#">Desarrollo de Apps</a></li>
          <li><a href="#">Marketing Digital</a></li>
          <li><a href="#">Consultoría IT</a></li>
          <li><a href="#">Soporte Técnico</a></li>
        </ul>
      </div>
    </main>
  </body>
</html>
