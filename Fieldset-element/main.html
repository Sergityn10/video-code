<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fieldset element</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1220;
        --surface: rgba(255, 255, 255, 0.06);
        --surface-2: rgba(255, 255, 255, 0.09);
        --border: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --accent: #7c3aed;
        --accent-2: #22c55e;
        --ring: rgba(124, 58, 237, 0.35);
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        color: var(--text);
        background:
          radial-gradient(
            1200px 800px at 20% 10%,
            rgba(124, 58, 237, 0.35),
            transparent 55%
          ),
          radial-gradient(
            900px 600px at 80% 15%,
            rgba(34, 197, 94, 0.22),
            transparent 60%
          ),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(920px, 100%);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.08),
          rgba(255, 255, 255, 0.05)
        );
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: clamp(18px, 3vw, 28px);
        backdrop-filter: blur(12px);
      }

      .title {
        margin: 0 0 14px;
        font-size: clamp(18px, 2.5vw, 24px);
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 16px;
      }

      fieldset {
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) - 4px);
        padding: 18px 16px 16px;
        background: var(--surface);
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease;
      }

      fieldset:focus-within {
        border-color: rgba(124, 58, 237, 0.85);
        box-shadow: 0 0 0 6px var(--ring);
        background: var(--surface-2);
      }

      legend {
        padding: 0 10px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.92);
      }

      .legend-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(124, 58, 237, 0.18);
        border: 1px solid rgba(124, 58, 237, 0.35);
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .label {
        color: var(--muted);
        font-size: 14px;
      }

      input[type="text"] {
        width: 100%;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(0, 0, 0, 0.22);
        color: var(--text);
        outline: none;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease;
      }

      input[type="text"]::placeholder {
        color: rgba(255, 255, 255, 0.45);
      }

      input[type="text"]:focus {
        border-color: rgba(124, 58, 237, 0.9);
        box-shadow: 0 0 0 5px var(--ring);
        background: rgba(0, 0, 0, 0.3);
      }

      input[type="text"]:invalid {
        border-color: rgba(239, 68, 68, 0.75);
      }

      .options {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .option {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.18);
        transition:
          border-color 160ms ease,
          transform 160ms ease,
          background 160ms ease;
        user-select: none;
      }

      .option:has(input:focus-visible) {
        border-color: rgba(124, 58, 237, 0.85);
        box-shadow: 0 0 0 5px var(--ring);
      }

      .option:has(input:checked) {
        border-color: rgba(34, 197, 94, 0.7);
        background: rgba(34, 197, 94, 0.12);
      }

      .option input {
        accent-color: var(--accent);
        width: 18px;
        height: 18px;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        padding-top: 6px;
      }

      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: linear-gradient(
          180deg,
          rgba(124, 58, 237, 0.95),
          rgba(124, 58, 237, 0.75)
        );
        color: white;
        border-radius: 12px;
        padding: 12px 14px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 160ms ease,
          filter 160ms ease,
          box-shadow 160ms ease;
      }

      button:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      fieldset[disabled] {
        opacity: 0.55;
        filter: saturate(0.7);
      }

      @media (min-width: 720px) {
        .grid {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1 class="title">
        Estilado moderno de <code>fieldset</code> y <code>legend</code>
      </h1>
      <p class="subtitle">
        En este ejemplo puedes mostrar borde, separación, layout interno, estado
        <code>:focus-within</code>, validación y una sección
        <code>disabled</code>.
      </p>

      <form>
        <fieldset>
          <legend><span class="legend-pill">Información personal</span></legend>
          <div class="grid">
            <label class="field">
              <span class="label">Nombre</span>
              <input
                name="nombre"
                type="text"
                autocomplete="given-name"
                required
                placeholder="Ej. Sergio"
              />
            </label>

            <label class="field">
              <span class="label">Apellidos</span>
              <input
                name="apellidos"
                type="text"
                autocomplete="family-name"
                required
                placeholder="Ej. García"
              />
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend><span class="legend-pill">Rango de edad</span></legend>
          <div class="options" role="group" aria-label="Rango de edad">
            <label class="option">
              <input type="checkbox" name="edad" value="20-39" />
              <span>20-39</span>
            </label>
            <label class="option">
              <input type="checkbox" name="edad" value="40-59" />
              <span>40-59</span>
            </label>
            <label class="option">
              <input type="checkbox" name="edad" value="60-79" />
              <span>60-79</span>
            </label>
          </div>
        </fieldset>

        <fieldset disabled>
          <legend>
            <span class="legend-pill">Sección deshabilitada</span>
          </legend>
          <div class="grid">
            <label class="field">
              <span class="label">Ciudad</span>
              <input name="ciudad" type="text" placeholder="No editable" />
            </label>
            <label class="field">
              <span class="label">País</span>
              <input name="pais" type="text" placeholder="No editable" />
            </label>
          </div>
        </fieldset>

        <div class="actions">
          <button type="submit">Enviar</button>
        </div>
      </form>
    </main>
  </body>
</html>
