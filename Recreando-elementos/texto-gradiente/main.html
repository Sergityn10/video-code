<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Texto gradientes</title>
    <style>
      body {
        display: grid;
        place-content: center;
      }
      span {
        background: linear-gradient(
          to right,
          #346bf1,
          #3279f8,
          #3186ff,
          #4093ff,
          #4fa0ff
        );
        background-clip: text;
        color: transparent;
        font-size: 42px;
        font-family:
          Google Sans,
          sans-serif;
      }
    </style>
  </head>
  <body>
    <main>
      <span>Hola, Sergio</span>
    </main>
  </body>
</html>
