<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoplay del video</title>
    <style>
      body {
        display: grid;
        place-content: center;
      }
      video {
        width: 500px;
      }
    </style>
  </head>

  <body>
    <main>
      <video
        loop
        crossorigin="use-credentials"
        autoplay
        src="flower.webm"
      ></video>
    </main>
  </body>
</html>
